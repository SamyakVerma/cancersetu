name: cancersetu
description: AI-powered early cancer screening for rural India
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Image & Media
  image_picker: ^1.0.7

  # Networking
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # Maps
  google_maps_flutter: ^2.6.0

  # Firebase
  firebase_core: ^2.32.0
  cloud_firestore: ^4.17.2
  firebase_storage: ^11.7.4

  # Text-to-Speech & Voice
  flutter_tts: ^4.0.2
  speech_to_text: ^6.6.2

  # PDF & File sharing
  pdf: ^3.11.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # On-device ML
  tflite_flutter: ^0.10.4

  # Local Storage
  sqflite: ^2.3.3+1

  # State Management
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
